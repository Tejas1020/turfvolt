name: turfvolt
description: "IronLog - Track. Progress. Dominate."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  appwrite: ^12.0.0
  provider: ^6.1.2
  go_router: ^13.0.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  awesome_snackbar_content: ^0.1.5
  phosphor_flutter: ^2.0.0

dependency_overrides:
  flutter_web_auth_2: ^5.0.1
  flutter_web_auth_2_platform_interface: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - Assets/exercises/
  fonts:
    - family: Rosnoc
      fonts:
        - asset: Assets/font/Rosnoc.otf
